<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wasteland Survivors</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg-dark: #0a0a0a; --bg-panel: #1a1a1a; --bg-light: #252525; --accent: #39ff14; --accent-dim: #1a5c0a; --danger: #ff3333; --warning: #ffaa00; --water: #00aaff; --food: #ff6b35; --energy: #ffee00; --meds: #ff00ff; --materials: #888888; --text: #e0e0e0; --text-dim: #666666; }
body { font-family: 'VT323', monospace; background: var(--bg-dark); color: var(--text); min-height: 100vh; background-image: radial-gradient(ellipse at top, #1a1a2e 0%, transparent 50%), repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px); }
.container { max-width: 1400px; margin: 0 auto; padding: 10px; display: grid; grid-template-columns: 1fr 300px; grid-template-rows: auto 1fr auto; gap: 10px; min-height: 100vh; }
header { grid-column: 1 / -1; background: var(--bg-panel); border: 2px solid var(--accent-dim); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
h1 { font-family: 'Share Tech Mono', monospace; color: var(--accent); text-shadow: 0 0 10px var(--accent); font-size: 1.8rem; }
.resources { display: flex; gap: 20px; flex-wrap: wrap; }
.resource { display: flex; align-items: center; gap: 5px; font-size: 1.3rem; padding: 5px 10px; background: var(--bg-light); border: 1px solid #333; }
.resource.food { border-color: var(--food); color: var(--food); }
.resource.water { border-color: var(--water); color: var(--water); }
.resource.energy { border-color: var(--energy); color: var(--energy); }
.resource.materials { border-color: var(--materials); color: var(--materials); }
.resource.meds { border-color: var(--meds); color: var(--meds); }
.main-panel { background: var(--bg-panel); border: 2px solid #333; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; align-content: start; }
.room { background: var(--bg-light); border: 2px solid #444; padding: 15px; text-align: center; cursor: pointer; transition: all 0.2s; min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.room:hover { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-dim); }
.room.built { border-color: var(--accent-dim); background: linear-gradient(135deg, var(--bg-light) 0%, #0d1a0d 100%); }
.room-icon { font-size: 2.5rem; margin-bottom: 5px; }
.room-name { font-size: 1.2rem; margin-bottom: 5px; }
.room-desc { font-size: 0.9rem; color: var(--text-dim); }
.room-cost { font-size: 0.85rem; color: var(--warning); margin-top: 5px; }
.room-level { font-size: 0.8rem; color: var(--accent); }
.sidebar { display: flex; flex-direction: column; gap: 10px; }
.panel { background: var(--bg-panel); border: 2px solid #333; padding: 15px; }
.panel h2 { color: var(--accent); font-size: 1.3rem; margin-bottom: 10px; border-bottom: 1px solid var(--accent-dim); padding-bottom: 5px; }
.survivor { background: var(--bg-light); border: 1px solid #444; padding: 10px; margin-bottom: 8px; }
.survivor-name { font-size: 1.1rem; color: var(--text); }
.survivor-stats { font-size: 0.9rem; color: var(--text-dim); display: flex; gap: 10px; flex-wrap: wrap; }
.survivor-skill { color: var(--energy); }
.survivor-health { color: var(--danger); }
.actions { display: flex; flex-direction: column; gap: 8px; }
button { font-family: 'VT323', monospace; font-size: 1.1rem; padding: 10px 15px; background: var(--bg-light); border: 2px solid #444; color: var(--text); cursor: pointer; transition: all 0.2s; }
button:hover { border-color: var(--accent); background: var(--accent-dim); }
button.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
button.primary:hover { background: var(--accent); color: var(--bg-dark); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.log { grid-column: 1 / -1; background: var(--bg-panel); border: 2px solid #333; padding: 15px; max-height: 200px; overflow-y: auto; font-size: 1rem; line-height: 1.4; }
.log-entry { margin-bottom: 5px; padding: 5px; border-left: 3px solid #444; }
.log-entry.info { border-color: var(--water); }
.log-entry.success { border-color: var(--accent); }
.log-entry.warning { border-color: var(--warning); }
.log-entry.danger { border-color: var(--danger); }
.log-entry.day { border-color: var(--energy); background: var(--bg-light); }
.expedition-panel { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
.expedition-panel.active { display: flex; }
.expedition-content { background: var(--bg-panel); border: 2px solid var(--accent); padding: 30px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
.location { background: var(--bg-light); border: 2px solid #444; padding: 15px; margin-bottom: 10px; cursor: pointer; }
.location:hover { border-color: var(--accent); }
.location-header { display: flex; justify-content: space-between; align-items: center; }
.location-name { font-size: 1.2rem; color: var(--accent); }
.location-risk { font-size: 0.9rem; }
.location-risk.high { color: var(--danger); }
.location-risk.medium { color: var(--warning); }
.location-risk.low { color: var(--accent); }
.survivor-select { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
.survivor-checkbox { padding: 8px 12px; background: var(--bg-light); border: 2px solid #444; cursor: pointer; }
.survivor-checkbox.selected { border-color: var(--accent); background: var(--accent-dim); }
.survivor-checkbox.disabled { opacity: 0.4; cursor: not-allowed; } { border-color: var(--accent); background: var(--accent-dim); }
.close-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; background: none; border: none; color: var(--text); cursor: pointer; }
.speed-controls { display: flex; gap: 5px; }
.speed-controls button { padding: 5px 10px; font-size: 1rem; }
.speed-controls { display: flex; gap: 5px; }
.speed-controls button { padding: 5px 8px; font-size: 0.9rem; }
.day-display { font-family: 'Share Tech Mono', monospace; color: var(--energy); font-size: 1.5rem; }
.game-over { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 200; display: none; justify-content: center; align-items: center; flex-direction: column; }
.game-over h1 { font-size: 4rem; color: var(--danger); text-shadow: 0 0 20px var(--danger); margin-bottom: 20px; }
.game-over p { font-size: 1.5rem; margin-bottom: 30px; }
.survivor-on-expedition { opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
<header>
<h1>☢️ WASTELAND SURVIVORS</h1>
<div class="day-display">DAY <span id="day">1</span> | <span id="gameTime">00:00</span> | <span id="speedDisplay">1x</span></div>
  <div class="speed-controls">
    <button onclick="gameState.speed = 0.5; log('Speed: 0.5x', 'info')" class="speed-btn">⏪</button>
    <button onclick="gameState.speed = 1; log('Speed: 1x', 'info')" class="speed-btn">▶️</button>
    <button onclick="gameState.speed = 2; log('Speed: 2x', 'info')" class="speed-btn">⏩</button>
    <button onclick="gameState.speed = 4; log('Speed: 4x', 'info')" class="speed-btn">⏭️</button>
  </div>
<div class="resources">
<div class="resource food">🍖 <span id="food">20</span></div>
<div class="resource water">💧 <span id="water">20</span></div>
<div class="resource energy">🔋 <span id="energy">20</span></div>
<div class="resource materials">🧱 <span id="materials">10</span></div>
<div class="resource meds">💊 <span id="meds">5</span></div>
</div>
</header>
<div class="main-panel" id="base"></div>
<div class="sidebar">
<div class="panel">
<h2>👥 SURVIVORS</h2>
<div id="survivors"></div>
</div>
<div class="panel">
<h2>⚡ ACTIONS</h2>
<div class="actions">
<button class="primary" onclick="nextDay()">NEXT DAY ⏭️</button>
<button onclick="openExpedition()">🛸 EXPEDITION</button>
<button onclick="checkGate()">🚪 CHECK GATE</button>
<button onclick="saveGame()">💾 SAVE</button>
    <button onclick="restartGame()" style="color:#ff3333;">🔄 NEW GAME</button>
</div>
</div>
</div>
<div class="log" id="log"></div>
</div>
<div class="expedition-panel" id="expeditionPanel">
<button class="close-btn" onclick="closeExpedition()">✕</button>
<div class="expedition-content" style="max-width:750px;">
<h2>🗺️ EXPEDITION</h2>
<p style="margin-bottom: 15px; color: var(--text-dim);">Select 1-3 survivors (max 2 per day each):</p>
<div class="survivor-select" id="expeditionSurvivors"></div>
<h3 style="margin: 20px 0 10px; color: var(--accent);">📍 LOCATIONS</h3>
<div id="mapContainer" style="position:relative;width:100%;height:280px;background:#0d1117;border:2px solid #333;margin:10px 0;"></div><div id="locationInfo" style="display:none;background:#252525;padding:10px;border:1px solid #444;margin-bottom:10px;"><strong id="locName"></strong><br><span id="locDetails" style="color:#666;font-size:0.9rem;"></span></div>
<button class="primary" onclick="startExpedition()" style="margin-top: 20px; width: 100%;">DEPART</button>
</div>
</div>
<div class="game-over" id="gameOver">
<h1>💀 GAME OVER</h1>
<p>Your colony has fallen.</p>
<p>You survived <span id="finalDays">0</span> days.</p>
<button class="primary" onclick="restartGame()">TRY AGAIN</button>
</div>
<script>
const ROOMS = {
shelter: { name: 'Shelter', icon: '🏠', desc: 'Max survivors +2', cost: { materials: 10 }, produce: null },
greenhouse: { name: 'Greenhouse', icon: '🌱', desc: 'Produces food', cost: { materials: 15, energy: 5 }, produce: { food: 3 } },
waterFilter: { name: 'Water Filter', icon: '💧', desc: 'Produces water', cost: { materials: 15, energy: 5 }, produce: { water: 3 } },
generator: { name: 'Generator', icon: '⚡', desc: 'Produces energy', cost: { materials: 20 }, produce: { energy: 4 } },
workshop: { name: 'Workshop', icon: '🔧', desc: 'Crafting', cost: { materials: 25, energy: 10 }, produce: null },
storage: { name: 'Storage', icon: '🏪', desc: '+50 cap each', cost: { materials: 15 }, produce: null }
};
const LOCATIONS = [
{ name: 'Supermarket', icon: '🏪', risk: 'low', food: 15, water: 10, materials: 5, meds: 2 },
{ name: 'Abandoned Factory', icon: '🏭', risk: 'medium', materials: 20, energy: 10, meds: 3 },
{ name: 'Hospital', icon: '🏥', risk: 'high', meds: 15, materials: 5 },
{ name: 'Power Plant', icon: '⚡', risk: 'high', energy: 25, materials: 10 },
{ name: 'Residential', icon: '🏠', risk: 'low', food: 8, water: 8, materials: 8, meds: 1 }
];
const NAMES = ['Alex', 'Sam', 'Jordan', 'Casey', 'Riley', 'Morgan', 'Taylor', 'Quinn', 'Avery', 'Blake', 'Drew', 'Skyler', 'Reese', 'Phoenix', 'Sage'];
const SKILLS = ['Scavenging', 'Combat', 'Medical', 'Technical'];
const TRAITS = ['Lucky', 'Brave', 'Resourceful', 'Fast', 'Cautious', 'Clumsy', 'Greedy', 'Lazy'];
let gameState = {
day: 1,
gameTime: 0,
lastTick: Date.now(),
resources: { food: 20, water: 20, energy: 20, materials: 10, meds: 5 },
maxResources: { food: 50, water: 50, energy: 50, materials: 50, meds: 20 },
rooms: { shelter: 0, greenhouse: 0, waterFilter: 0, generator: 0, workshop: 0, storage: 0 },
survivors: [],
selectedForExpedition: [],
  selectedLocation: null,
expeditionCount: {},
  activeExpeditions: [],
  locationResources: {}, // depleting resources per location
lastRecruitDay: 0,
  speed: 1,
onExpedition: []
};
function init() {
loadGame();
if (gameState.survivors.length === 0) {
const startCount = 1 + Math.floor(Math.random() * 2);
for (let i = 0; i < startCount; i++) {
const name = NAMES[Math.floor(Math.random() * NAMES.length)];
const skill = SKILLS[Math.floor(Math.random() * SKILLS.length)];
const trait = TRAITS[Math.floor(Math.random() * TRAITS.length)];
gameState.survivors.push({ name, health: 80 + Math.floor(Math.random() * 20), skill, trait, expeditionsToday: 0 });
}
log('Started with ' + startCount + ' survivor(s).', 'info');
}
setInterval(realTimeTick, 1000);
render();
log('Welcome to Wasteland Survivors. Build your colony and survive!', 'info');
}


// SPEED AND TIME
function realTimeTick() {
  const now = Date.now();
  const elapsed = (now - gameState.lastTick) / 1000;
  const target = 60 / (gameState.speed || 1);
  if (elapsed >= target) {
    gameState.gameTime += Math.floor(elapsed / target);
    gameState.lastTick = now;
    if (gameState.gameTime >= 24) {
      gameState.gameTime = 0;
      nextDay();
    }
    updateTimeDisplay();
    checkExpeditions();
  }
}

function updateTimeDisplay() {
  const t = document.getElementById('gameTime');
  if (t) t.textContent = (gameState.gameTime || 0).toString().padStart(2, '0') + ':00';
  const s = document.getElementById('speedDisplay');
  if (s) s.textContent = (gameState.speed || 1) + 'x';
}

function setSpeed(mult) {
  gameState.speed = mult;
  gameState.lastTick = Date.now();
  updateTimeDisplay();
}

// MAP
function renderMap() {
  const c = document.getElementById('mapContainer');
  if (!c) return;
  c.innerHTML = '<div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:2rem;">🏕️<br><span style="font-size:0.6rem;color:#39ff14">BASE</span></div>';
  LOCATIONS.forEach((loc, i) => {
    const d = document.createElement('div');
    d.style.cssText = 'position:absolute;left:' + loc.x + '%;top:' + loc.y + '%;transform:translate(-50%,-50%);cursor:pointer;font-size:1.5rem;text-align:center;';
    d.innerHTML = loc.icon + '<br><span style="font-size:0.5rem;color:' + (loc.risk === 'high' ? '#ff3333' : loc.risk === 'medium' ? '#ffaa00' : '#39ff14') + '">' + loc.name + '</span>';
    d.onclick = () => selectLocation(loc);
    c.appendChild(d);
    // Line
    const l = document.createElement('div');
    const dist = Math.sqrt(Math.pow(loc.x-50, 2) + Math.pow(loc.y-50, 2));
    const ang = Math.atan2(loc.y-50, loc.x-50) * 180 / Math.PI;
    l.style.cssText = 'position:absolute;left:50%;top:50%;width:' + dist + '%;height:2px;background:#333;transform-origin:left;transform:rotate(' + ang + 'deg);';
    c.insertBefore(l, c.firstChild);
  });
}

function selectLocation(loc) {
  gameState.selectedLocation = loc;
  const info = document.getElementById('locationInfo');
  const name = document.getElementById('locName');
  const details = document.getElementById('locDetails');
  if (info && name && details) {
    info.style.display = 'block';
    name.textContent = loc.icon + ' ' + loc.name;
    const mins = (loc.hours * 60 / (gameState.speed || 1) / 60).toFixed(1);
    details.innerHTML = '⏱️ ' + loc.hours + 'h (' + mins + 'min) | Risk: <span style="color:' + (loc.risk === 'high' ? '#ff3333' : loc.risk === 'medium' ? '#ffaa00' : '#39ff14') + '">' + loc.risk + '</span>';
  }
  const btn = document.getElementById('departBtn');
  if (btn) {
    btn.disabled = gameState.selectedForExpedition.length === 0;
    btn.textContent = gameState.selectedForExpedition.length === 0 ? 'SELECT SURVIVORS' : 'DEPART';
  }
}

// EXPEDITIONS
function checkExpeditions() {
  if (!gameState.activeExpeditions) return;
  const now = Date.now();
  gameState.activeExpeditions = gameState.activeExpeditions.filter(exp => {
    if (now >= exp.returnTime) {
      completeExpedition(exp);
      return false;
    }
    return true;
  });
}

function completeExpedition(exp) {
  const loc = exp.location;
  const success = Math.random() < 0.7;
  if (success) {
    let loot = [];
    for (let [k, v] of Object.entries(loc)) {
      if (['food','water','energy','materials','meds'].includes(k) && v > 0) {
        const amt = Math.floor(v * (0.5 + Math.random() * 0.5));
        if (amt > 0) {
          gameState.resources[k] = (gameState.resources[k] || 0) + amt;
          loot.push(k + ':+' + amt);
        }
      }
    }
    log('Expedition returned! ' + loot.join(' '), 'success');
  } else {
    exp.survivorIds.forEach(i => { if (gameState.survivors[i]) gameState.survivors[i].health -= 15; });
    log('Expedition failed! Injuries.', 'danger');
  }
  checkSurvival();
  render();
  saveGame();
}
function realTimeTick() {
const now = Date.now();
const elapsed = (now - gameState.lastTick) / 1000;
if (elapsed >= 1) {
gameState.gameTime += Math.floor(elapsed);
gameState.lastTick = now;
if (gameState.gameTime >= 24) {
gameState.gameTime = 0;
nextDay();
}
updateTimeDisplay();
}
}
function updateTimeDisplay() {
const timeEl = document.getElementById('gameTime');
if (timeEl) timeEl.textContent = gameState.gameTime.toString().padStart(2, '0') + ':00';
}
function render() {
document.getElementById('day').textContent = gameState.day;
for (let r of ['food', 'water', 'energy', 'materials', 'meds']) {
document.getElementById(r).textContent = Math.floor(gameState.resources[r]);
}
renderRooms();
renderSurvivors();
}
function renderRooms() {
const container = document.getElementById('base');
container.innerHTML = '';
for (let [key, room] of Object.entries(ROOMS)) {
const level = gameState.rooms[key];
const div = document.createElement('div');
div.className = 'room ' + (level > 0 ? 'built' : '');
div.onclick = () => buildRoom(key);
let html = '<div class="room-icon">' + room.icon + '</div>';
html += '<div class="room-name">' + room.name + '</div>';
if (level > 0) {
html += '<div class="room-level">Level ' + level + '</div>';
if (room.produce) {
const prod = [];
for (let [k, v] of Object.entries(room.produce)) {
prod.push((k === 'food' ? '🍖' : k === 'water' ? '💧' : '🔋') + ' +' + (v * level));
}
html += '<div class="room-desc">' + prod.join(' ') + '</div>';
}
} else {
html += '<div class="room-desc">' + room.desc + '</div>';
const costs = [];
for (let [k, v] of Object.entries(room.cost)) {
costs.push((k === 'materials' ? '🧱' : '🔋') + ' ' + v);
}
html += '<div class="room-cost">' + costs.join(', ') + '</div>';
}
div.innerHTML = html;
container.appendChild(div);
}
}
function renderSurvivors() {
const container = document.getElementById('survivors');
container.innerHTML = '';
const maxSurvivors = 3 + gameState.rooms.shelter * 2;
if (gameState.survivors.length === 0) {
container.innerHTML = '<p style="color: var(--text-dim);">No survivors yet. Check the gate!</p>';
return;
}
for (let i = 0; i < gameState.survivors.length; i++) {
const s = gameState.survivors[i];
const onExp = gameState.onExpedition.includes(i);
const div = document.createElement('div');
div.className = 'survivor' + (onExp ? ' survivor-on-expedition' : '');
const skillIcon = s.skill === 'Scavenging' ? '🔍' : s.skill === 'Combat' ? '⚔️' : s.skill === 'Medical' ? '💊' : '🔧';
div.innerHTML = '<div class="survivor-name">' + s.name + (onExp ? ' (on expedition)' : '') + '</div>' +
'<div class="survivor-stats"><span class="survivor-health">❤️ ' + s.health + '</span>' +
'<span class="survivor-skill">' + skillIcon + ' ' + s.skill + '</span></div>' +
'<div style="font-size: 0.8rem; color: var(--text-dim); margin-top: 4px;">Expeditions today: ' + (s.expeditionsToday || 0) + '/2</div>';
container.appendChild(div);
}
container.innerHTML += '<p style="color: var(--text-dim); margin-top: 10px;">Capacity: ' + gameState.survivors.length + '/' + maxSurvivors + '</p>';
}
function buildRoom(key) {
const room = ROOMS[key];
const cost = {};
for (let [k, v] of Object.entries(room.cost)) {
cost[k] = v * (gameState.rooms[key] + 1);
}
for (let [k, v] of Object.entries(cost)) {
if (gameState.resources[k] < v) {
log('Not enough ' + k + '! Need ' + v + '.', 'warning');
return;
}
}
for (let [k, v] of Object.entries(cost)) {
gameState.resources[k] -= v;
}
gameState.rooms[key]++;
log('Built ' + room.name + ' level ' + gameState.rooms[key] + '!', 'success');
render();
}
function nextDay() {
gameState.day++;
gameState.gameTime = 0;
// Reset daily limits
gameState.expeditionCount = {};
gameState.onExpedition = [];
for (let s of gameState.survivors) s.expeditionsToday = 0;
const survivorCount = gameState.survivors.length;
// Production
for (let [key, level] of Object.entries(gameState.rooms)) {
if (level > 0 && ROOMS[key].produce) {
for (let [r, v] of Object.entries(ROOMS[key].produce)) {
gameState.resources[r] += v * level;
}
}
}
// Storage capacity
const storageBonus = gameState.rooms.storage * 50;
for (let r of ['food', 'water', 'energy', 'materials', 'meds']) {
gameState.maxResources[r] = 50 + storageBonus;
}
// Consumption
gameState.resources.food -= survivorCount;
gameState.resources.water -= survivorCount;
gameState.resources.energy -= Math.max(1, Math.floor(survivorCount / 2));
// Random event
if (Math.random() < 0.3) {
randomEvent();
}
// Check survival
checkSurvival();
log('Day ' + gameState.day + ' begins.', 'day');
render();
saveGame();
}
function randomEvent() {
const events = [
{ text: 'A stranger requests entry at the gate...', type: 'info' },
{ text: 'Raiders spotted nearby!', type: 'warning' },
{ text: 'Found supplies in the wasteland!', type: 'success' },
{ text: 'A trader has arrived!', type: 'info' },
{ text: 'Disease outbreak!', type: 'danger' }
];
const event = events[Math.floor(Math.random() * events.length)];
log(event.text, event.type);
switch(event.text) {
case 'Found supplies in the wasteland!':
gameState.resources.food += 5;
gameState.resources.water += 5;
break;
case 'Disease outbreak!':
if (gameState.survivors.length > 0 && gameState.resources.meds > 0) {
gameState.resources.meds--;
log('Used 1 med to treat the disease.', 'warning');
} else if (gameState.survivors.length > 0) {
const s = gameState.survivors[Math.floor(Math.random() * gameState.survivors.length)];
s.health -= 30;
log(s.name + ' got sick! -30 health.', 'danger');
}
break;
case 'Raiders spotted nearby!':
if (gameState.survivors.length > 0) {
const loss = Math.floor(Math.random() * 5) + 1;
gameState.resources.materials -= loss;
if (gameState.resources.materials < 0) gameState.resources.materials = 0;
log('Raiders took ' + loss + ' materials!', 'danger');
}
break;
}
}
function checkSurvival() {
for (let r of ['food', 'water']) {
if (gameState.resources[r] < 0) {
gameState.resources[r] = 0;
const damage = Math.floor(Math.random() * 20) + 10;
for (let s of gameState.survivors) {
s.health -= damage;
}
log(r + ' depleted! Survivors took ' + damage + ' damage!', 'danger');
}
}
gameState.survivors = gameState.survivors.filter(s => {
if (s.health <= 0) {
log(s.name + ' has died!', 'danger');
return false;
}
return true;
});
// Cap resources
for (let r of Object.keys(gameState.resources)) {
if (gameState.resources[r] > gameState.maxResources[r]) {
gameState.resources[r] = gameState.maxResources[r];
}
}
if (gameState.survivors.length === 0) {
document.getElementById('finalDays').textContent = gameState.day;
document.getElementById('gameOver').style.display = 'flex';
}
}
function checkGate() {
if (gameState.day === gameState.lastRecruitDay) {
log('You already checked the gate today. Come back tomorrow.', 'warning');
return;
}
gameState.lastRecruitDay = gameState.day;
const maxSurvivors = 3 + gameState.rooms.shelter * 2;
if (gameState.survivors.length >= maxSurvivors) {
log('Shelter is full! Build more rooms.', 'warning');
return;
}
if (Math.random() < 0.5) {
const name = NAMES[Math.floor(Math.random() * NAMES.length)];
const skill = SKILLS[Math.floor(Math.random() * SKILLS.length)];
const trait = TRAITS[Math.floor(Math.random() * TRAITS.length)];
const survivor = { name, health: 80 + Math.floor(Math.random() * 20), skill, trait, expeditionsToday: 0 };
gameState.survivors.push(survivor);
log('🎉 ' + name + ' arrived at the gate! Skill: ' + skill + ', Trait: ' + trait, 'success');
} else {
log('No one at the gate...', 'info');
}
render();
}
function openExpedition() {
if (gameState.survivors.length === 0) {
log('No survivors available for expedition!', 'warning');
return;
}
document.getElementById('expeditionPanel').classList.add('active');
const survContainer = document.getElementById('expeditionSurvivors');
survContainer.innerHTML = '';
for (let i = 0; i < gameState.survivors.length; i++) {
const s = gameState.survivors[i];
const onExp = gameState.onExpedition.includes(i);
const div = document.createElement('div');
div.className = 'survivor-checkbox' + (onExp ? '' : '');
div.textContent = s.name + ' (' + s.skill + ') ' + (s.expeditionsToday || 0) + '/2';
div.style.opacity = onExp ? '0.5' : '1';
if (!onExp && (s.expeditionsToday || 0) < 2) {
div.onclick = () => toggleSurvivorForExpedition(i, div);
}
survContainer.appendChild(div);
}
const locContainer = document.getElementById('locations');
locContainer.innerHTML = '';
for (let loc of LOCATIONS) {
const div = document.createElement('div');
div.className = 'location';
const loot = [];
for (let [k, v] of Object.entries(loc)) {
if (['food', 'water', 'materials', 'energy', 'meds'].includes(k) && v > 0) {
loot.push((k === 'food' ? '🍖' : k === 'water' ? '💧' : k === 'materials' ? '🧱' : k === 'energy' ? '🔋' : '💊') + ' ' + v);
}
}
div.innerHTML = '<div class="location-header"><span class="location-name">' + loc.icon + ' ' + loc.name + '</span><span class="location-risk ' + loc.risk + '">' + loc.risk.toUpperCase() + ' RISK</span></div><div style="margin-top: 5px; color: var(--text-dim);">' + loot.join(' ') + '</div>';
locContainer.appendChild(div);
}
}
function toggleSurvivorForExpedition(index, el) {
const idx = gameState.selectedForExpedition.indexOf(index);
if (idx >= 0) {
gameState.selectedForExpedition.splice(idx, 1);
el.classList.remove('selected');
} else {
if (gameState.selectedForExpedition.length < 3) {
gameState.selectedForExpedition.push(index);
el.classList.add('selected');
}
}
}
function closeExpedition() {
document.getElementById('expeditionPanel').classList.remove('active');
gameState.selectedForExpedition = [];
}
function startExpedition() {
if (gameState.selectedForExpedition.length === 0) {
log('Select at least one survivor!', 'warning');
return;
}
// Check expedition limit
for (let idx of gameState.selectedForExpedition) {
const s = gameState.survivors[idx];
const count = s.expeditionsToday || 0;
if (count >= 2) {
log(s.name + ' has already done 2 expeditions today!', 'warning');
return;
}
}
const location = gameState.selectedLocation;
const cost = gameState.selectedForExpedition.length * 3;
if (gameState.resources.energy < cost) {
log('Not enough energy! Need ' + cost + '.', 'warning');
return;
}
gameState.resources.energy -= cost;
// Mark survivors as on expedition
for (let idx of gameState.selectedForExpedition) {
gameState.onExpedition.push(idx);
gameState.survivors[idx].expeditionsToday = (gameState.survivors[idx].expeditionsToday || 0) + 1;
}
log('Expedition to ' + location.name + ' departed with ' + gameState.selectedForExpedition.length + ' survivors.', 'info');
let successChance = 0.7;
if (location.risk === 'high') successChance = 0.4;
if (location.risk === 'medium') successChance = 0.6;
for (let idx of gameState.selectedForExpedition) {
const s = gameState.survivors[idx];
if (s.skill === 'Scavenging') successChance += 0.15;
if (s.skill === 'Combat' && location.risk === 'high') successChance += 0.1;
}
const success = Math.random() < successChance;
render();
setTimeout(() => {
if (success) {
let loot = [];
for (let [k, v] of Object.entries(location)) {
if (['food', 'water', 'materials', 'energy', 'meds'].includes(k)) {
const amount = Math.floor(v * (0.7 + Math.random() * 0.6));
gameState.resources[k] += amount;
loot.push(k + ': +' + amount);
}
}
log('Expedition returned successfully! Found: ' + loot.join(', '), 'success');
} else {
for (let idx of gameState.selectedForExpedition) {
const damage = Math.floor(Math.random() * 20) + 10;
gameState.survivors[idx].health -= damage;
}
log('Expedition failed! Survivors injured.', 'danger');
}
// Remove from expedition
gameState.onExpedition = [];
checkSurvival();
render();
closeExpedition();
saveGame();
}, 2000);
}
function log(msg, type) {
type = type || 'info';
const container = document.getElementById('log');
const div = document.createElement('div');
div.className = 'log-entry ' + type;
div.textContent = '[Day ' + gameState.day + '] ' + msg;
container.insertBefore(div, container.firstChild);
if (container.children.length > 50) {
container.removeChild(container.lastChild);
}
}
function saveGame() {
localStorage.setItem('wasteland_survivors', JSON.stringify(gameState));
}
function loadGame() {
const saved = localStorage.getItem('wasteland_survivors');
if (saved) {
try {
const loaded = JSON.parse(saved);
gameState = { ...gameState, ...loaded };
if (!gameState.expeditionCount) gameState.expeditionCount = {};
if (!gameState.lastRecruitDay) gameState.lastRecruitDay = 0;
    if (!gameState.speed) gameState.speed = 1;
if (!gameState.gameTime) gameState.gameTime = 0;
if (!gameState.lastTick) gameState.lastTick = Date.now();
if (!gameState.onExpedition) gameState.onExpedition = [];
for (let s of gameState.survivors) {
if (!s.expeditionsToday) s.expeditionsToday = 0;
}
} catch(e) {
console.log('Failed to load save');
}
}
}
function restartGame() {
localStorage.removeItem('wasteland_survivors');
location.reload();
}
init();
</script>
