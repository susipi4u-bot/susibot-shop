 async function initProducts() {
   const status = document.getElementById('status');
   
   try {
     // Clear existing products
     const existing = await db.collection('products').get();
     for (const doc of existing.docs) {
       await doc.ref.delete();
     }
     status.innerHTML += 'Alte Produkte gelöscht<br>';
     
     // Add new products
     for (const product of products) {
       await db.collection('products').doc(product.id).set(product);
       status.innerHTML += `✓ ${product.name} hinzugefügt<br>`;
     }
     
     status.innerHTML += '<h2>Alle Produkte wurden hinzugefügt!</h2>';
   } catch (error) {
     status.innerHTML += '<h2 style="color:red">Fehler: ' + error.message + '</h2>';
   }
 }
